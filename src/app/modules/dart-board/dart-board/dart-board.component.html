<div class="game-layout"
     [class.ai-active-border]="currentPlayerService.isAITurn() && currentPlayerService.hasThrowsRemaining()">
  <app-current-player-progress></app-current-player-progress>

  <div class="ai-acting-overlay" *ngIf="currentPlayerService.isAITurn() && currentPlayerService.hasThrowsRemaining()">
    <div class="ai-acting-text">
      {{ currentPlayerService._currentPlayer.value.name }} is acting ...
    </div>
  </div>

  <div class="game-content-container">
    <div class="pow-container shadow rounded d-flex flex-row">
      <app-player-overview></app-player-overview>
      <button class="p-2" mat-icon-button (click)="openPlayersOverviewDialog()">
        <mat-icon>groups</mat-icon>
      </button>
    </div>

    <div id="dart-input" class="d-flex flex-row">
      <div class="input-container">
        <app-input-button-row></app-input-button-row>
      </div>
      <div class="d-flex multiplier-miss flex-column pt-5 me-2">
        <app-multiplier-toggle></app-multiplier-toggle>
        <app-miss-btn></app-miss-btn>
      </div>
    </div>
  </div>
</div>
